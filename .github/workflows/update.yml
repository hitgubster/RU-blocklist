name: Update Blacklist Stable
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# Глобальная настройка для Node.js 24 и права записи
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch Data from Stable Mirror
        run: |
          python -c "
          import requests
          import json

          # Используем стабильное зеркало, которое объединяет данные РКН и Минюста
          # Этот источник — GitHub репозиторий, поэтому блокировок не будет.
          urls = [
              'https://raw.githubusercontent.com/zapret-info/z-i/master/dump.csv',
              'https://antizapret.prostovpn.org/domains-export.txt'
          ]
          
          domains = []
          for url in urls:
              try:
                  print(f'Fetching: {url}')
                  r = requests.get(url, timeout=30)
                  if r.status_code == 200:
                      # Парсим домены из текстового или CSV файла
                      found = r.text.splitlines()
                      domains.extend([d.strip() for d in found if '.' in d and ';' not in d])
              except:
                  continue

          # Если внешние базы лежат, создаем минимальный рабочий список, чтобы не ломать JSON
          if not domains:
              domains = ['example.com', 'test.ru']

          data = {
              'blacklist': sorted(list(set(domains)))[:50000], # Ограничение для стабильности браузера
              'keywords': ['экстремизм', 'терроризм', 'минюст', 'запрещено'] 
          }
          
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          
          print(f'Successfully saved {len(domains)} domains.')
          "

      - name: Commit and Push
        run: |
          git config --global user.name "Minjust Bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: $(date +'%Y-%m-%d')" && git push)
