name: Update Blacklist Stable
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# Устанавливаем на самом верхнем уровне
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Дублируем env внутри job для гарантии
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2 # Указываем конкретную минорную версию

      - name: Set up Python
        uses: actions/setup-python@v5.4.0 # Указываем конкретную минорную версию
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch and Merge Data
        run: |
          python -c "
          import requests
          import json
          import re

          sources = [
              'https://raw.githubusercontent.com/zapret-info/z-i/master/dump.csv',
              'https://raw.githubusercontent.com/it-gov-ru/russian-blocklist/main/domains.txt'
          ]
          
          domains = set()
          for url in sources:
              try:
                  r = requests.get(url, timeout=30)
                  if r.status_code == 200:
                      found = re.findall(r'\b(?:[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.)+[a-z]{2,}\b', r.text.lower())
                      domains.update(found)
              except: continue

          data = {
              'blacklist': sorted(list(domains))[:40000],
              'keywords': ['экстремист', 'терроризм', 'запрещено', 'минюст']
          }
          
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          "

      - name: Commit and Push
        run: |
          git config --global user.name "Minjust Bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: $(date +'%Y-%m-%d')" && git push)
