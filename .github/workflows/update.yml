name: Update Blacklist from Minjust
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests

      - name: Download and Process Data
        run: |
          python -c "
          import requests
          import json
          import re

          url = 'https://minjust.gov.ru/uploaded/files/exportfsm.csv'
          headers = {'User-Agent': 'Mozilla/5.0'}
          
          try:
              # Скачиваем с игнорированием ошибок SSL
              response = requests.get(url, headers=headers, verify=False, timeout=120)
              response.encoding = 'cp1251' # Кодировка Минюста
              
              if response.status_code == 200:
                  lines = response.text.splitlines()
                  
                  # Извлекаем домены
                  content = response.text
                  domains = sorted(list(set(re.findall(r'\b(?:[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.)+[a-z]{2,}\b', content))))
                  
                  # Извлекаем ключевые фразы (вторая колонка CSV)
                  keywords = []
                  for line in lines:
                      parts = line.split(';')
                      if len(parts) > 1:
                          phrase = parts[1].replace('\"', '').strip()
                          if phrase and phrase != 'Наименование':
                              keywords.append(phrase)
                  keywords = sorted(list(set(keywords)))

                  # Сохраняем в JSON
                  data = {
                      'blacklist': domains,
                      'keywords': keywords
                  }
                  with open('data.json', 'w', encoding='utf-8') as f:
                      json.dump(data, f, ensure_ascii=False, indent=2)
                  print('Successfully updated data.json')
              else:
                  print(f'Error: Status code {response.status_code}')
                  exit(1)
          except Exception as e:
              print(f'Connection failed: {e}')
              exit(1)
          "

      - name: Commit and Push
        run: |
          git config --global user.name "Minjust Bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git commit -m "Auto-update: $(date +'%Y-%m-%d')" || exit 0
          git push
