name: Update Blacklist from Minjust
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests

      - name: Download via Proxy
        run: |
          python -c "
          import requests
          import json
          import re

          # Список прокси-сервисов для обхода блокировки IP Гитхаба
          proxies = [
              'https://api.allorigins.win/raw?url=',
              'https://corsproxy.io/?'
          ]
          target_url = 'https://minjust.gov.ru/uploaded/files/exportfsm.csv'
          
          data_found = False
          content = ''

          for proxy in proxies:
              try:
                  print(f'Trying proxy: {proxy}')
                  full_url = f'{proxy}{target_url}'
                  r = requests.get(full_url, timeout=30, verify=False)
                  if r.status_code == 200 and len(r.content) > 1000:
                      content = r.content.decode('cp1251', errors='ignore')
                      data_found = True
                      print('Success!')
                      break
              except Exception as e:
                  print(f'Proxy failed: {e}')

          if not data_found:
              print('Could not bypass blocking. Using fallback empty structure.')
              exit(1)

          # Парсинг (регулярки для доменов и фраз)
          domains = sorted(list(set(re.findall(r'\b(?:[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.)+[a-z]{2,}\b', content))))
          keywords = []
          for line in content.splitlines():
              parts = line.split(';')
              if len(parts) > 1:
                  phrase = parts[1].replace('\"', '').strip()
                  if phrase and phrase != 'Наименование':
                      keywords.append(phrase)
          keywords = sorted(list(set(keywords)))

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump({'blacklist': domains, 'keywords': keywords}, f, ensure_ascii=False, indent=2)
          "

      - name: Commit and Push
        run: |
          git config --global user.name "Minjust Bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git commit -m "Auto-update: $(date +'%Y-%m-%d')" || exit 0
          git push
