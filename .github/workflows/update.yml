name: Update Blacklist from Minjust
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# Устанавливаем Node.js 24 принудительно для устранения предупреждений
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download and Parse Minjust CSV
        run: |
          # Используем user-agent браузера и игнорируем ошибки SSL для обхода ошибки 35
          curl -k -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0" \
          "https://minjust.gov.ru/uploaded/files/exportfsm.csv" -o minjust.csv
          
          # Проверка: если файл пустой, выходим с ошибкой
          [ -s minjust.csv ] || { echo "File is empty"; exit 1; }

          # Извлекаем домены (все)
          grep -oE "\b([a-z0-9]+(-[a-z0-9]+)*\.)+[a-z]{2,}\b" minjust.csv | sort -u > domains.txt
          
          # Извлекаем ключевые фразы (весь список, очистка от мусора)
          # Берем вторую колонку, убираем кавычки и спецсимволы
          cut -d';' -f2 minjust.csv | sed 's/"//g' | tr -d '\r' | grep -v "Наименование" | sort -u > keywords.txt

          # Формируем JSON
          echo "{" > data.json
          echo '  "blacklist": [' >> data.json
          sed 's/.*/    "&",/' domains.txt | sed '$ s/,$//' >> data.json
          echo '  ],' >> data.json
          echo '  "keywords": [' >> data.json
          sed 's/.*/    "&",/' keywords.txt | sed '$ s/,$//' >> data.json
          echo '  ]' >> data.json
          echo "}" >> data.json

      - name: Commit and Push
        run: |
          git config --global user.name "Minjust Bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git commit -m "Auto-update: $(date +'%Y-%m-%d')" || exit 0
          git push
