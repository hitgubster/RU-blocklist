name: Update Blacklist from Minjust
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Убираем предупреждение Node.js
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 # Самая свежая версия

      - name: Install Dependencies
        run: sudo apt-get install -y iconv

      - name: Download and Parse Minjust CSV
        run: |
          # Код 28 лечится увеличением тайм-аута и ретриями
          # --connect-timeout 60 (ждем минуту подключения)
          # --retry 5 (пробуем 5 раз если упало)
          curl -k -L -A "Mozilla/5.0" \
          --connect-timeout 60 \
          --max-time 300 \
          --retry 5 \
          --retry-delay 10 \
          "https://minjust.gov.ru/uploaded/files/exportfsm.csv" -o minjust_raw.csv
          
          # Проверка на пустоту
          [ -s minjust_raw.csv ] || { echo "Download failed (empty file)"; exit 1; }

          # Конвертируем Windows-1251 в UTF-8 (чтобы русский текст читался)
          iconv -f WINDOWS-1251 -t UTF-8//IGNORE minjust_raw.csv -o minjust.csv

          # Извлекаем домены
          grep -oE "\b([a-z0-9]+(-[a-z0-9]+)*\.)+[a-z]{2,}\b" minjust.csv | sort -u > domains.txt
          
          # Извлекаем ключевые фразы (вторая колонка)
          cut -d';' -f2 minjust.csv | sed 's/"//g' | tr -d '\r' | grep -v "Наименование" | sort -u > keywords.txt

          # Формируем JSON
          echo "{" > data.json
          echo '  "blacklist": [' >> data.json
          sed 's/.*/    "&",/' domains.txt | sed '$ s/,$//' >> data.json
          echo '  ],' >> data.json
          echo '  "keywords": [' >> data.json
          sed 's/.*/    "&",/' keywords.txt | sed '$ s/,$//' >> data.json
          echo '  ]' >> data.json
          echo "}" >> data.json

      - name: Commit and Push
        run: |
          git config --global user.name "Minjust Bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git commit -m "Auto-update: $(date +'%Y-%m-%d')" || exit 0
          git push
