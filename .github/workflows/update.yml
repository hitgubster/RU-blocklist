name: Update Blacklist from API
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Принудительно используем Node 24 для чистого лога
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch Clean Data
        run: |
          python -c "
          import requests
          import json

          try:
              # Используем более надежную конечную точку API
              r = requests.get('https://reestr.rublacklist.net/api/v3/domains/json/', timeout=60)
              raw_data = r.json()
              
              # API может возвращать либо список строк, либо список объектов
              domains = []
              if isinstance(raw_data, list):
                  for item in raw_data:
                      if isinstance(item, str):
                          domains.append(item)
                      elif isinstance(item, dict):
                          domains.append(item.get('domain', ''))
              
              # Очистка от пустых строк
              domains = [d for d in domains if d]

              # Получаем ключевые слова (ОРИ)
              rk = requests.get('https://reestr.rublacklist.net/api/v3/disseminators/json/', timeout=60)
              keywords_raw = rk.json()
              keywords = []
              if isinstance(keywords_raw, list):
                  for k in keywords_raw:
                      val = k.get('url') or k.get('name')
                      if val: keywords.append(val)

              data = {
                  'blacklist': sorted(list(set(domains))),
                  'keywords': sorted(list(set(keywords)))[:3000]
              }
              
              with open('data.json', 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
              
              print(f'Success! Processed {len(domains)} domains and {len(keywords)} keywords.')
          except Exception as e:
              print(f'API error: {e}')
              exit(1)
          "

      - name: Commit and Push
        run: |
          git config --global user.name "Minjust Bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update from API: $(date +'%Y-%m-%d')" && git push)
